<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cura.tor | Smart Contact Curation</title>

    <!-- PWA Meta Tags -->
    <meta name="description" content="Scan and curate business cards with smart OCR technology">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cura.tor">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Cura.tor">
    <meta name="msapplication-TileColor" content="#020617">
    <meta name="msapplication-TileImage" content="/icons/icon-144.png">

    <!-- App Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-72.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-128.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="root"></div>
    <script>
        window.__APP_LOADED = false;
        window.onerror = function(msg, url, line, col, error) {
            document.getElementById('root').innerHTML =
                '<div style="padding:20px;font-family:monospace;font-size:14px;color:#ef4444;background:#1e1e1e;min-height:100vh;white-space:pre-wrap;word-break:break-all;">' +
                'APP ERROR:\n\n' + msg + '\n\nFile: ' + url + '\nLine: ' + line + ':' + col +
                '\n\nStack:\n' + (error && error.stack ? error.stack : 'N/A') + '</div>';
        };
        window.addEventListener('unhandledrejection', function(e) {
            document.getElementById('root').innerHTML =
                '<div style="padding:20px;font-family:monospace;font-size:14px;color:#ef4444;background:#1e1e1e;min-height:100vh;white-space:pre-wrap;word-break:break-all;">' +
                'PROMISE ERROR:\n\n' + (e.reason ? (e.reason.stack || e.reason.message || e.reason) : 'Unknown') + '</div>';
        });
        // Detect if JS module failed to load entirely
        setTimeout(function() {
            if (!window.__APP_LOADED) {
                var root = document.getElementById('root');
                if (!root.children.length || root.innerHTML.trim() === '') {
                    root.innerHTML =
                        '<div style="padding:20px;font-family:monospace;font-size:13px;color:#fbbf24;background:#1e1e1e;min-height:100vh;white-space:pre-wrap;word-break:break-all;">' +
                        'DIAGNOSTIC: App did not load after 8 seconds.\n\n' +
                        'User Agent: ' + navigator.userAgent + '\n\n' +
                        'URL: ' + location.href + '\n\n' +
                        'Online: ' + navigator.onLine + '\n\n' +
                        'Protocol: ' + location.protocol + '\n\n' +
                        'Testing script fetch...\n</div>';
                    // Try to fetch the built JS to see if it returns an error
                    var scripts = document.querySelectorAll('script[type=module]');
                    if (scripts.length) {
                        fetch(scripts[0].src).then(function(r) {
                            root.innerHTML += '<div style="padding:0 20px;font-family:monospace;font-size:13px;color:#fbbf24;background:#1e1e1e;white-space:pre-wrap;">JS fetch status: ' + r.status + ' ' + r.statusText + '\nContent-Type: ' + r.headers.get('content-type') + '\nContent-Length: ' + r.headers.get('content-length') + '</div>';
                        }).catch(function(err) {
                            root.innerHTML += '<div style="padding:0 20px;font-family:monospace;font-size:13px;color:#ef4444;background:#1e1e1e;white-space:pre-wrap;">JS fetch FAILED: ' + err.message + '</div>';
                        });
                    }
                }
            }
        }, 8000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
